name: build

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  linux-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            pkg-config \
            libsdl2-dev \
            libsdl2-ttf-dev \
            lsof \
            procps \
            fonts-dejavu-core

      - name: Configure
        run: cmake -S . -B build

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Upload apcommander suite
        uses: actions/upload-artifact@v4
        with:
          name: apcommander-linux-x64
          path: |
            build/apcommander
            build/portcommander
            build/wificommander
          if-no-files-found: error
