# APcommander launcher config — defaults.
#
# This is the default config that ships with apcommander. It is loaded
# only when no higher-priority config is found. The dashboard never has
# tile data baked into the binary — every tile comes from a file.
#
# To customize, copy this file to one of (highest priority first):
#   1. argv[1]:                              apcommander /path/to/myconfig.conf
#   2. $APCOMMANDER_CONFIG environment variable
#   3. $XDG_CONFIG_HOME/apcommander/tiles.conf
#      (or ~/.config/apcommander/tiles.conf if XDG_CONFIG_HOME is unset)
#   4. <binary-dir>/apcommander.conf         (your override next to the binary)
#   5. <binary-dir>/apcommander.default.conf ← this file
#
# Then edit your copy. Higher-priority locations completely replace this
# file; there is no per-key merging.
#
# Format: one [section] per launcher tile, in the order you want them
# displayed. The section name itself is just an anchor (not shown).
#
# Recognized keys (per section):
#   title   — required; shown as the option's main label
#   exec    — required; absolute path, ~/-relative path, app-dir-relative
#             path (e.g. ./scripts/foo.sh), or a bare name (looked up first
#             next to the apcommander binary, then in $PATH)
#   desc    — optional; subtitle line
#   args    — optional; whitespace-separated arguments. Wrap a value in
#             double quotes to keep its spaces ("hello world").
#   hotkey  — optional; single printable character. Reserved keys (q/w/s/k/j
#             and arrows/Home/End/Enter/Esc) are claimed by the dashboard
#             itself and won't fire as a hotkey.
#
# Lines starting with '#' or ';' are comments. Inline comments are NOT
# supported (so 'exec = /opt/foo#bar' is treated as the literal path).
#
# ---------------------------------------------------------------------------
# Default suite — the in-tree tools that ship with this repo.
# ---------------------------------------------------------------------------

[port-commander]
title  = Port Commander
desc   = Inspect open TCP/UDP sockets
exec   = portcommander
hotkey = 1

[wifi-commander]
title  = Wi-Fi Commander
desc   = Manage Wi-Fi & hotspot
exec   = wificommander
hotkey = 2

[adc-monitor]
title  = ADC Monitor
desc   = 8-channel 24-bit ADC scope
exec   = adc_gui
hotkey = 3

[psu-dual]
title  = PSU Dual
desc   = Dual-channel power supply
exec   = psu_gui
hotkey = 4

[psu-single]
title  = PSU Single
desc   = Single-channel power supply
exec   = psu_gui_single
hotkey = 5

[psu-toolbar-dual]
title  = PSU Toolbar Dual
desc   = Compact dual-channel strip
exec   = psu_gui_toolbar
hotkey = 6

[psu-toolbar-single]
title  = PSU Toolbar Single
desc   = Compact single-channel strip
exec   = psu_gui_toolbar_single
hotkey = 7

[bench-dmm]
title  = Bench Multimeter
desc   = DMM: V / A / Ohm / Hz / Cap
exec   = dmm_gui
hotkey = 8

[eload]
title  = DC Electronic Load
desc   = CC / CV / CR / CP modes
exec   = eload_gui
hotkey = 9

# ---------------------------------------------------------------------------
# Examples — uncomment and edit to add anything you launch often.
# ---------------------------------------------------------------------------

